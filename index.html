<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Foodies Viewer</title>
    <link rel="stylesheet" href="static/style.css">
</head>

<body>
    <header class="site-header">
        <h1>Foodies Viewer</h1>
        <button id="theme-toggle" class="theme-toggle" aria-label="Switch to dark mode">
            <span class="theme-toggle__icon theme-toggle__icon--sun" aria-hidden="true">☀️</span>
            <span class="theme-toggle__icon theme-toggle__icon--moon" aria-hidden="true">🌙</span>
        </button>
    </header>
    <div id="frame-container" class="frame-container" aria-live="polite"></div>

    <noscript>
        Please enable JavaScript to load the menus.
    </noscript>

    <script src="static/app.js" defer></script>
</body>

</html>
